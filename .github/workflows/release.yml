name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          publish: echo "noop"
          title: "chore: version package"
          commit: "chore: version package"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: version
    if: needs.version.outputs.hasChangesets == 'false'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Debug OIDC and npm config
        run: |
          echo "=== .npmrc ==="
          cat ~/.npmrc || echo "no ~/.npmrc"
          cat .npmrc || echo "no ./.npmrc"
          echo ""
          echo "=== npm whoami ==="
          npm whoami 2>&1 || echo "npm whoami failed (expected with OIDC)"
          echo ""
          echo "=== npm config ==="
          npm config list
          echo ""
          echo "=== Package info ==="
          node -p "require('./package.json').name + '@' + require('./package.json').version"
          echo ""
          echo "=== npm access ==="
          npm access list packages @pompidup 2>&1 || echo "npm access failed"

      - name: Publish to npm
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")

          if [ "$LOCAL_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "Publishing $PACKAGE_NAME@$LOCAL_VERSION (npm has $PUBLISHED_VERSION)"
            npm publish --provenance --access public 2>&1
          else
            echo "Version $LOCAL_VERSION already published, skipping"
          fi
