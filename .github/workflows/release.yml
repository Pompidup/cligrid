name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Check for changesets
        id: changesets
        uses: changesets/action@v1
        with:
          publish: echo "skip"
          title: "chore: version package"
          commit: "chore: version package"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm with provenance
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          # Check if current version is already published
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")

          if [ "$LOCAL_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "Publishing $PACKAGE_NAME@$LOCAL_VERSION (npm has $PUBLISHED_VERSION)"
            npm publish --provenance --access public
          else
            echo "Version $LOCAL_VERSION already published, skipping"
          fi
